<html lang="es">
<head>

  <style>

      padding: 0;
      box-sizing: border-box;

    body {

      display: flex;

      align-items: center;

    }
    .app-container {

    #capturaCanvas {

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;

      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;

    }

    .spinner {

      0% { transform: rotate(0deg); }

  </style>

<script>
  (function() {
    // Configuración de la rifa - CORREGIDA
    const CONFIG = {
      totalNumbers: 100,
      titulo: "Corneta de 40000 watts",
      descripcionCorta: "Potente corneta profesional",
      precio: "5$ por número",
      fechaLimite: "la rifa jugara al ser vendidos todos los numeros",

    };

    // Estado de la aplicación
    let numeros = [];
    let adminMode = false;

    // Cargar datos guardados
    function loadFromStorage() {
      const stored = localStorage.getItem('rifa_vendidos');
      if (stored) {
        try {
          numeros = JSON.parse(stored);
          if (!Array.isArray(numeros)) numeros = [];
        } catch (e) { 
          numeros = []; 
        }
      } else {
        numeros = [];
      }
    }

    function saveToStorage() {
      localStorage.setItem('rifa_vendidos', JSON.stringify(numeros));
    }

    loadFromStorage();

    // Funciones auxiliares
    function isVendido(num) {
      return numeros.some(item => item.numero === num);
    }

    function getVendidosCount() {
      return numeros.length;
    }

    function getVentaByNumero(num) {
      return numeros.find(item => item.numero === num);
    }

    function eliminarVenta(numero) {
      if (confirm(`¿Estás seguro de eliminar la venta del número ${numero}?`)) {
        numeros = numeros.filter(item => item.numero !== numero);
        saveToStorage();
        renderUI();
      }
    }

    function editarVenta(numero, nuevosDatos) {
      const index = numeros.findIndex(item => item.numero === numero);
      if (index !== -1) {
        numeros[index] = { ...numeros[index], ...nuevosDatos };
        saveToStorage();
        renderUI();
      }
    }

    // Función para dibujar rectángulos redondeados
    function roundRect(ctx, x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    
   // Función para generar imagen profesional estilo Canva
async function generarImagenRifa() {
  const canvas = document.getElementById('capturaCanvas');
  const ctx = canvas.getContext('2d');
  const loadingOverlay = document.getElementById('loadingOverlay');
  
  loadingOverlay.classList.add('active');

  try {
    // Configurar canvas (1080x1350 como la plantilla de Canva)
    canvas.width = 1080;
    canvas.height = 1350;

    // ---------- FONDO BLANCO PURO ----------
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ---------- TIPOGRAFÍA: DM Sans y Paalalabas Condensed (aproximación) ----------
    // Usaremos fuentes similares: 'DM Sans' y 'Poppins' como alternativa

    // ---------- ENCABEZADO MINIMALISTA ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 50px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CORNETA DE 40000 WATTS', canvas.width/2, 100);

    ctx.fillStyle = '#666666';
    ctx.font = '28px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('Potente corneta profesional', canvas.width/2, 160);

    // Línea fina decorativa
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(200, 190);
    ctx.lineTo(880, 190);
    ctx.stroke();

    // ---------- TEXTO DE BENEFICIO DESTACADO ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 36px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('RIFA A BENEFICIO DE', canvas.width/2, 260);
    
    ctx.fillStyle = '#FF0000'; // Rojo para destacar
    ctx.font = 'bold 42px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('NÉSTOR GUERRERO', canvas.width/2, 320);

    // ---------- TARJETA DE PRECIO Y FECHA ----------
    const infoY = 380;
    const infoWidth = 800;
    const infoHeight = 70;
    const infoX = (canvas.width - infoWidth) / 2;

    // Fondo gris muy claro
    ctx.fillStyle = '#F8F8F8';
    ctx.shadowColor = 'rgba(0,0,0,0.05)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 2;
    roundRect(ctx, infoX, infoY, infoWidth, infoHeight, 35);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Precio
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 32px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('💰 $5.000 c/u', infoX + 50, infoY + 45);

    // Fecha
    ctx.textAlign = 'right';
    ctx.fillText('📅 30/04/2025', infoX + infoWidth - 50, infoY + 45);

    // ---------- CONTADOR MINIMALISTA ----------
    const vendidos = getVendidosCount();
    const disponibles = CONFIG.totalNumbers - vendidos;

    // Número grande de vendidos
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 90px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(vendidos.toString(), canvas.width/2, 540);

    ctx.fillStyle = '#666666';
    ctx.font = '24px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('VENDIDOS', canvas.width/2, 600);

    ctx.fillStyle = '#000000';
    ctx.font = '28px "DM Sans", "Poppins", sans-serif';
    ctx.fillText(`Disponibles: ${disponibles}`, canvas.width/2, 660);

    // ---------- TÍTULO DE LA TABLA ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 32px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('Números disponibles', canvas.width/2, 740);

    // ---------- CUADRÍCULA DE NÚMEROS (TODOS LOS 100) ----------
    const startY = 790;
    const boxSize = 70;
    const margin = 6;
    const cols = 10;
    const startX = (canvas.width - (cols * (boxSize + margin))) / 2;

    // Dibujar números del 1 al 100
    for (let i = 1; i <= CONFIG.totalNumbers; i++) {
      const row = Math.floor((i - 1) / cols);
      const col = (i - 1) % cols;
      const x = startX + col * (boxSize + margin);
      const y = startY + row * (boxSize + margin);

      // Fondo según estado
      if (isVendido(i)) {
        ctx.fillStyle = '#F0F0F0'; // Gris muy claro para vendido
      } else {
        ctx.fillStyle = '#FFFFFF'; // Blanco para disponible
      }
      
      // Borde sutil
      ctx.strokeStyle = '#DDDDDD';
      ctx.lineWidth = 1;
      
      // Sombra muy sutil
      ctx.shadowColor = 'rgba(0,0,0,0.05)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      
      roundRect(ctx, x, y, boxSize, boxSize, 8);
      ctx.fill();
      ctx.stroke();

      // Reset sombra
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      
      // Número
      if (isVendido(i)) {
        ctx.fillStyle = '#999999';
      } else {
        ctx.fillStyle = '#000000';
      }
      ctx.font = 'bold 26px "DM Sans", "Poppins", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i.toString(), x + boxSize/2, y + boxSize/2);
    }

    // Posición final de la cuadrícula
    const gridEndY = startY + (Math.ceil(CONFIG.totalNumbers/cols) * (boxSize + margin));

    // ---------- LEYENDA MINIMALISTA ----------
    const legendY = gridEndY + 40;

    // Disponible
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 1;
    ctx.shadowColor = 'rgba(0,0,0,0.05)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    roundRect(ctx, 280, legendY, 30, 30, 4);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000000';
    ctx.font = '24px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Disponible', 330, legendY + 20);

    // Vendido
    ctx.fillStyle = '#F0F0F0';
    ctx.strokeStyle = '#DDDDDD';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    roundRect(ctx, 530, legendY, 30, 30, 4);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#999999';
    ctx.fillText('Vendido', 580, legendY + 20);

    // ---------- MENSAJE DEL SORTEO ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 28px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎲 La rifa jugará a la primera vez', canvas.width/2, legendY + 80);
    ctx.font = '28px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('el número de los números', canvas.width/2, legendY + 120);

    // ---------- PIE DE PÁGINA ----------
    const footerY = canvas.height - 70;

    // Línea fina
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(200, footerY - 20);
    ctx.lineTo(880, footerY - 20);
    ctx.stroke();

    // Fecha
    const fecha = new Date();
    const options = { 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    };
    
    ctx.fillStyle = '#999999';
    ctx.font = '20px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('Generado el ' + fecha.toLocaleDateString('es-ES', options), canvas.width/2, footerY);

    // Convertir canvas a blob
    return new Promise((resolve) => {
      canvas.toBlob((blob) => {
        resolve(blob);
      }, 'image/png');
    });
  } catch (error) {
    console.error('Error generando imagen:', error);
    throw error;
  } finally {
    loadingOverlay.classList.remove('active');
  }
}

    ctx.fillStyle = '#000000';
    ctx.font = 'bold 90px "DM Sans", "Poppins", sans-serif';
    ctx.fillText(vendidos.toString(), canvas.width/2, 490);

    ctx.fillStyle = '#666666';
    ctx.font = '26px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('VENDIDOS', canvas.width/2, 550);

    ctx.fillStyle = '#000000';
    ctx.font = '28px "DM Sans", "Poppins", sans-serif';
    ctx.fillText(`Disponibles: ${disponibles}`, canvas.width/2, 610);

    // Tercera línea separadora
    ctx.strokeStyle = '#DDDDDD';
    ctx.beginPath();
    ctx.moveTo(200, 650);
    ctx.lineTo(880, 650);
    ctx.stroke();

    // ---------- TÍTULO DE LA TABLA ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 32px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('Números disponibles', canvas.width/2, 710);

    // ---------- CUADRÍCULA DE NÚMEROS (TODOS LOS 100) ----------
    const startY = 760;
    const boxSize = 68; // Ligeramente más pequeños para que quepan mejor
    const margin = 5;
    const cols = 10; // 10 columnas para 100 números
    const startX = (canvas.width - (cols * (boxSize + margin))) / 2;

    // Dibujar números del 1 al 100
    for (let i = 1; i <= CONFIG.totalNumbers; i++) {
      const row = Math.floor((i - 1) / cols);
      const col = (i - 1) % cols;
      const x = startX + col * (boxSize + margin);
      const y = startY + row * (boxSize + margin);

      // Verificar que no nos salgamos del canvas
      if (y + boxSize > canvas.height - 100) {
        console.warn('¡Ajusta la altura del canvas!');
      }

      // Fondo según estado
      if (isVendido(i)) {
        ctx.fillStyle = '#F0F0F0'; // Vendido
        ctx.strokeStyle = '#DDDDDD';
      } else {
        ctx.fillStyle = '#FFFFFF'; // Disponible
        ctx.strokeStyle = '#DDDDDD';
      }
      
      // Borde y sombra sutil
      ctx.shadowColor = 'rgba(0,0,0,0.03)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetY = 1;
      ctx.lineWidth = 1;
      
      roundRect(ctx, x, y, boxSize, boxSize, 6);
      ctx.fill();
      ctx.stroke();

      // Reset sombra
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      
      // Número
      if (isVendido(i)) {
        ctx.fillStyle = '#999999';
      } else {
        ctx.fillStyle = '#000000';
      }
      ctx.font = 'bold 24px "DM Sans", "Poppins", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i.toString(), x + boxSize/2, y + boxSize/2);
    }

    // Calcular posición final de la cuadrícula (después del número 100)
    const gridEndY = startY + (10 * (boxSize + margin)); // 10 filas

    // ---------- LEYENDA ----------
    const legendY = gridEndY + 30;

    // Disponible
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#DDDDDD';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetY = 1;
    roundRect(ctx, 280, legendY, 28, 28, 4);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000000';
    ctx.font = '22px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Disponible', 325, legendY + 20);

    // Vendido
    ctx.fillStyle = '#F0F0F0';
    ctx.strokeStyle = '#DDDDDD';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetY = 1;
    roundRect(ctx, 530, legendY, 28, 28, 4);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#999999';
    ctx.fillText('Vendido', 575, legendY + 20);

    // ---------- MENSAJE DEL SORTEO ----------
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 26px "DM Sans", "Poppins", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎲 La rifa jugará a la primera vez', canvas.width/2, legendY + 80);
    ctx.font = '26px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('el número de los números', canvas.width/2, legendY + 120);

    // ---------- PIE DE PÁGINA ----------
    const footerY = canvas.height - 50;

    // Línea final
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(200, footerY - 20);
    ctx.lineTo(880, footerY - 20);
    ctx.stroke();

    // Fecha
    const fecha = new Date();
    const options = { 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    };
    
    ctx.fillStyle = '#999999';
    ctx.font = '18px "DM Sans", "Poppins", sans-serif';
    ctx.fillText('Generado el ' + fecha.toLocaleDateString('es-ES', options), canvas.width/2, footerY);

    // Convertir canvas a blob
    return new Promise((resolve) => {
      canvas.toBlob((blob) => {
        resolve(blob);
      }, 'image/png');
    });
  } catch (error) {
    console.error('Error generando imagen:', error);
    throw error;
  } finally {
    loadingOverlay.classList.remove('active');
  }
}
  
    // Función para compartir en WhatsApp
    async function compartirWhatsAppImagen() {
      try {
        const imagenBlob = await generarImagenRifa();
        const file = new File([imagenBlob], 'rifa-estado.png', { type: 'image/png' });
        
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: CONFIG.titulo,
            text: `🔊 ${CONFIG.titulo}\n📊 ${getVendidosCount()} de ${CONFIG.totalNumbers} números vendidos`,
            files: [file]
          });
        } else {
          const url = URL.createObjectURL(imagenBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'rifa-estado.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          
          setTimeout(() => {
            URL.revokeObjectURL(url);
            const mensaje = encodeURIComponent('🔊 ' + CONFIG.titulo + ' - ' + getVendidosCount() + ' números vendidos');
            window.open('https://wa.me/?text=' + mensaje, '_blank');
          }, 100);
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al generar la imagen. Intenta de nuevo.');
      }
    }

    // Renderizar UI
    function renderUI() {
      const overlay = document.getElementById('mainOverlay');
      const vendidosCount = getVendidosCount();
      
      if (adminMode) {
        document.body.classList.add('admin-active');
      } else {
        document.body.classList.remove('admin-active');
      }

      let html = `
        <div class="rifa-header">
          <div class="rifa-titulo">🔊 ${CONFIG.titulo}</div>
          <div class="rifa-desc">
            <span>${CONFIG.descripcionCorta}</span>
            <span class="badge-precio"><i class="fas fa-tag"></i> ${CONFIG.precio}</span>
            <span class="badge-fecha"><i class="far fa-calendar-alt"></i> ${CONFIG.fechaLimite}</span>
          </div>
        </div>

        <div class="contador-vendidos">
          <span class="contador-label"><i class="fas fa-ticket-alt"></i> VENDIDOS</span>
          <span class="contador-numero">${vendidosCount} / ${CONFIG.totalNumbers}</span>
        </div>
      `;

      if (!adminMode) {
        html += `
          <div class="pin-modal">
            <form id="pinForm" style="display: flex; gap: 8px;">
              <input type="password" id="pinInput" placeholder="clave admin" style="flex:2; background:#1e1e2e; border-radius:60px; border:1px solid gold; padding:14px; color:white;" />
              <button type="submit" class="btn" style="flex:1; background:gold;">Entrar</button>
            </form>
            <div class="text-small"><i class="fas fa-lock"></i> modo solo ver disponible</div>
          </div>
        `;
      } else {
        html += `
          <div style="background:goldenrod; padding:12px; border-radius:60px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; color:black; font-weight:bold;">
            <span><i class="fas fa-crown"></i> ADMIN ACTIVO</span>
            <button id="salirAdminBtn" class="btn-outline" style="background:black; color:white; border:none; padding:8px 18px; border-radius:40px;">Salir</button>
          </div>
        `;
      }

      html += `<div class="numeros-grid" id="numerosGrid">`;
      for (let i = 1; i <= CONFIG.totalNumbers; i++) {
        const vendido = isVendido(i);
        const estadoClass = vendido ? 'vendido' : 'disponible';
        html += `<div class="numero-item ${estadoClass}" data-numero="${i}">${i}</div>`;
      }
      html += `</div>`;

      if (adminMode && numeros.length > 0) {
        html += `<div class="admin-panel"><h3><i class="fas fa-users"></i> Compradores (${numeros.length})</h3>`;
        numeros.sort((a, b) => a.numero - b.numero).forEach(venta => {
          html += `
            <div class="venta-item">
              <div class="venta-info">
                <span class="venta-numero">#${venta.numero}</span>
                <div class="venta-detalle">
                  <i class="fas fa-user"></i> ${venta.nombre || 'Sin nombre'}<br>
                  <i class="fas fa-phone"></i> ${venta.telefono}<br>
                  <i class="fas fa-comment"></i> ${venta.nota || 'Sin nota'}
                </div>
              </div>
              <div class="venta-acciones">
                <button class="btn-editar" onclick="editarVentaClick(${venta.numero})"><i class="fas fa-edit"></i></button>
                <button class="btn-eliminar" onclick="eliminarVentaClick(${venta.numero})"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      }

      html += `
        <div class="btn-flotante-share">
          <button class="btn-share-main" id="shareMainBtn"><i class="fab fa-whatsapp"></i> Compartir</button>
        </div>
        <div id="shareOptions" style="display: none;" class="sub-opciones">
          <button id="shareRedesBtn"><i class="fab fa-facebook"></i> Texto</button>
          <button id="shareWhatsAppImgBtn"><i class="fab fa-whatsapp"></i> Imagen 📸</button>
          <button id="shareWhatsAppTodosBtn"><i class="fab fa-whatsapp"></i> Mensaje</button>
        </div>
      `;

      if (adminMode) {
        html += `<div id="modalVenta" style="display: none;" class="modal-vender"></div>`;
        html += `<div id="modalEditar" style="display: none;" class="modal-editar"></div>`;
      }

      html += `<hr><footer>PWA Rifa · toca números (admin) para vender</footer>`;
      overlay.innerHTML = html;

      // Event listeners
      if (!adminMode) {
        const pinForm = document.getElementById('pinForm');
        if (pinForm) {
          pinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const pin = document.getElementById('pinInput').value;
            if (pin === CONFIG.adminPassword) {
              adminMode = true;
              renderUI();
            } else {
              alert('Clave incorrecta');
            }
          });
        }
      } else {
        document.getElementById('salirAdminBtn')?.addEventListener('click', () => {
          adminMode = false;
          renderUI();
        });

        document.querySelectorAll('.numero-item.disponible').forEach(item => {
          item.addEventListener('click', (e) => {
            const numero = parseInt(e.currentTarget.dataset.numero);
            mostrarFormularioVenta(numero);
          });
        });

        document.querySelectorAll('.numero-item.vendido').forEach(item => {
          item.addEventListener('click', (e) => {
            const numero = parseInt(e.currentTarget.dataset.numero);
            const venta = getVentaByNumero(numero);
            if (venta) {
              alert(`🎫 Número: ${venta.numero}\n👤 ${venta.nombre}\n📞 ${venta.telefono}\n📝 ${venta.nota}`);
            }
          });
        });
      }

      document.getElementById('shareMainBtn')?.addEventListener('click', () => {
        const opt = document.getElementById('shareOptions');
        opt.style.display = opt.style.display === 'none' ? 'flex' : 'none';
      });

      document.getElementById('shareRedesBtn')?.addEventListener('click', () => {
        const mensaje = encodeURIComponent(`🔊 ${CONFIG.titulo}\n📊 ${getVendidosCount()} de ${CONFIG.totalNumbers} vendidos\n💰 ${CONFIG.precio}`);
        window.open(`https://twitter.com/intent/tweet?text=${mensaje}`, '_blank');
        document.getElementById('shareOptions').style.display = 'none';
      });

      document.getElementById('shareWhatsAppImgBtn')?.addEventListener('click', async () => {
        document.getElementById('shareOptions').style.display = 'none';
        await compartirWhatsAppImagen();
      });

      document.getElementById('shareWhatsAppTodosBtn')?.addEventListener('click', () => {
        const telefonos = numeros.map(item => item.telefono).filter(t => t);
        if (telefonos.length === 0) {
          alert('No hay teléfonos');
          return;
        }
        const msg = prompt('Mensaje:', '🔊 ¡Hola! Les recuerdo que la rifa se cierra pronto.');
        if (msg) {
          window.open(`https://wa.me/${telefonos[0].replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
          alert(`Chat con ${telefonos[0]}`);
        }
        document.getElementById('shareOptions').style.display = 'none';
      });
    }

    // Funciones globales
    window.eliminarVentaClick = function(numero) {
      eliminarVenta(numero);
    };

    window.editarVentaClick = function(numero) {
      const venta = getVentaByNumero(numero);
      if (venta) mostrarFormularioEditar(venta);
    };

    function mostrarFormularioVenta(numero) {
      const modal = document.getElementById('modalVenta');
      modal.style.display = 'block';
      modal.innerHTML = `
        <h3>Vender número ${numero}</h3>
        <input type="text" id="venderNombre" placeholder="Nombre" />
        <input type="tel" id="venderTelefono" placeholder="Teléfono" required />
        <textarea id="venderNota" placeholder="Nota"></textarea>
        <div class="btn-group">
          <button class="btn" id="confirmarVentaBtn">Vender</button>
          <button class="btn-outline" id="cancelarVentaBtn">Cancelar</button>
        </div>
      `;

      document.getElementById('cancelarVentaBtn').onclick = () => modal.style.display = 'none';
      document.getElementById('confirmarVentaBtn').onclick = () => {
        const tel = document.getElementById('venderTelefono').value.trim();
        if (!tel) { alert('Teléfono requerido'); return; }
        numeros.push({
          numero: numero,
          nombre: document.getElementById('venderNombre').value.trim() || 'Sin nombre',
          telefono: tel,
          nota: document.getElementById('venderNota').value.trim(),
          fecha: new Date().toISOString()
        });
        saveToStorage();
        modal.style.display = 'none';
        renderUI();
      };
    }

    function mostrarFormularioEditar(venta) {
      const modal = document.getElementById('modalEditar');
      modal.style.display = 'block';
      modal.innerHTML = `
        <h3>Editar número ${venta.numero}</h3>
        <input type="text" id="editarNombre" value="${venta.nombre || ''}" />
        <input type="tel" id="editarTelefono" value="${venta.telefono || ''}" />
        <textarea id="editarNota">${venta.nota || ''}</textarea>
        <div class="btn-group">
          <button class="btn" id="guardarEdicionBtn">Guardar</button>
          <button class="btn-outline" id="cancelarEdicionBtn">Cancelar</button>
        </div>
      `;

      document.getElementById('cancelarEdicionBtn').onclick = () => modal.style.display = 'none';
      document.getElementById('guardarEdicionBtn').onclick = () => {
        const tel = document.getElementById('editarTelefono').value.trim();
        if (!tel) { alert('Teléfono requerido'); return; }
        editarVenta(venta.numero, {
          nombre: document.getElementById('editarNombre').value.trim(),
          telefono: tel,
          nota: document.getElementById('editarNota').value.trim()
        });
        modal.style.display = 'none';
      };
    }

    // Inicializar
    document.getElementById('appContainer').style.setProperty('--bg-image', `url('${CONFIG.bgImage}')`);
    renderUI();

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
        self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
      `)).catch(() => {});
    }
  })();
</script>
