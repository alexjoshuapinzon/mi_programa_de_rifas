<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Mi Rifa · Gestor PWA</title>
  <link rel="manifest" href="#">
  <meta name="theme-color" content="#121212">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .app-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      border-radius: 36px 36px 28px 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .overlay-dark {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(2px);
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      color: white;
      padding: 20px 18px;
    }

    .rifa-header {
      background: rgba(30, 30, 40, 0.6);
      backdrop-filter: blur(8px);
      padding: 18px 16px;
      border-radius: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    .rifa-titulo {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: #fff;
      text-shadow: 2px 2px 0 #00000050;
    }

    .rifa-desc {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-top: 10px;
      color: #e0e0e0;
      font-weight: 500;
      gap: 8px;
    }

    .badge-precio,
    .badge-fecha {
      background: #ffd966d0;
      color: #000;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      backdrop-filter: blur(4px);
      border: 1px solid gold;
    }

    .badge-precio i,
    .badge-fecha i {
      margin-right: 6px;
    }

    .contador-vendidos {
      background: #1e2a3a;
      border-radius: 60px;
      padding: 12px 20px;
      margin: 8px 0 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #3f5e7a;
      box-shadow: inset 0 0 8px #00000055;
      font-weight: bold;
    }

    .contador-numero {
      font-size: 2.2rem;
      font-weight: 900;
      color: gold;
      line-height: 1;
    }

    .contador-label {
      font-size: 1rem;
      text-transform: uppercase;
      color: #bcd5ff;
    }

    .numeros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
      margin: 15px 0 20px;
      max-height: 340px;
      overflow-y: auto;
      padding: 5px 5px 10px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 32px;
    }

    .numero-item {
      background: rgba(20, 30, 35, 0.8);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 14px 5px;
      text-align: center;
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
      border: 2px solid;
      transition: 0.2s;
      cursor: default;
      color: white;
    }

    .numero-item.disponible {
      border-color: #2ecc71;
      background: #2ecc7120;
      color: #d0ffe0;
    }

    .numero-item.vendido {
      border-color: #e74c3c;
      background: #e74c3c30;
      color: #ffc4c4;
    }

    body.admin-active .numero-item.disponible {
      cursor: pointer;
      box-shadow: 0 0 0 2px gold;
    }

    body.admin-active .numero-item.vendido {
      cursor: pointer;
      box-shadow: 0 0 0 2px #e74c3c;
    }

    .admin-panel {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 16px;
      margin: 15px 0;
      border: 2px solid gold;
    }

    .admin-panel h3 {
      color: gold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .venta-item {
      background: #1e2a3a;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #3f5e7a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .venta-info {
      flex: 1;
    }

    .venta-numero {
      font-weight: 800;
      color: gold;
      font-size: 1.2rem;
      margin-right: 10px;
    }

    .venta-detalle {
      font-size: 0.9rem;
      color: #ddd;
    }

    .venta-detalle i {
      margin-right: 5px;
      color: gold;
    }

    .btn-eliminar {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 8px 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
    }

    .btn-eliminar:hover {
      background: #c0392b;
    }

    .btn-editar {
      background: #3498db;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 8px 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-right: 8px;
    }

    .venta-acciones {
      display: flex;
      gap: 5px;
    }

    .modal-vender,
    .modal-editar {
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      border: 2px solid gold;
      border-radius: 36px;
      padding: 22px;
      margin: 10px 0;
      color: white;
      position: relative;
      z-index: 100;
    }

    .modal-vender input,
    .modal-vender select,
    .modal-vender textarea,
    .modal-editar input,
    .modal-editar textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 40px;
      border: none;
      background: #2d2d3a;
      color: white;
      font-size: 1rem;
      padding-left: 20px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      background: gold;
      border: none;
      padding: 14px 20px;
      border-radius: 40px;
      font-weight: 800;
      flex: 1;
      color: black;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid gold;
      color: gold;
      cursor: pointer;
    }

    .btn-flotante-share {
      position: sticky;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 15px 0 5px;
    }

    .btn-share-main {
      background: #25d366;
      border: none;
      border-radius: 60px;
      padding: 16px 28px;
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 0 10px 25px #25d36680;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #111;
      border: 2px solid gold;
      cursor: pointer;
    }

    .sub-opciones {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .sub-opciones button {
      flex: 1;
      background: #2c3e50;
      border: none;
      border-radius: 50px;
      padding: 12px;
      color: white;
      font-weight: 600;
      border: 1px solid gold;
      cursor: pointer;
      min-width: 120px;
    }

    .pin-modal {
      background: #000000bb;
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 25px;
      margin-bottom: 15px;
    }

    .text-small {
      font-size: 0.8rem;
      color: #ccc;
    }

    hr {
      border: 1px solid #ffffff30;
      margin: 15px 0;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #aaa;
    }

    .badge-admin {
      background: #e74c3c;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-left: 10px;
    }

    #capturaCanvas {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
      gap: 20px;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid gold;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>

      // Estado de la aplicación
      let numeros = [];
      let adminMode = false;

      // Cargar datos guardados
      function loadFromStorage() {
        const stored = localStorage.getItem('rifa_vendidos');
        if (stored) {
          try {
            numeros = JSON.parse(stored);
            if (!Array.isArray(numeros)) numeros = [];
          } catch (e) {
            numeros = [];
          }
        } else {
          numeros = [];
        }
      }

      function saveToStorage() {
        localStorage.setItem('rifa_vendidos', JSON.stringify(numeros));
      }

      loadFromStorage();

      // Funciones auxiliares
      function isVendido(num) {
        return numeros.some(item => item.numero === num);
      }

      function getVendidosCount() {
        return numeros.length;
      }

      function getVentaByNumero(num) {
        return numeros.find(item => item.numero === num);
      }

      function eliminarVenta(numero) {
        if (confirm(`¿Estás seguro de eliminar la venta del número ${numero}?`)) {
          numeros = numeros.filter(item => item.numero !== numero);
          saveToStorage();
          renderUI();
        }
      }

      function editarVenta(numero, nuevosDatos) {
        const index = numeros.findIndex(item => item.numero === numero);
        if (index !== -1) {
          numeros[index] = { ...numeros[index], ...nuevosDatos };
          saveToStorage();
          renderUI();
        }
      }

      // Función para dibujar rectángulos redondeados
      function roundRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
      }

      // Función para generar imagen profesional - Diseño Fresh Premium
      async function generarImagenRifa() {
        const canvas = document.getElementById('capturaCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.add('active');

        try {
          await document.fonts.ready;

          const W = 1080;
          const H = 2100;
          canvas.width = W;
          canvas.height = H;

          const vendidos = getVendidosCount();
          const disponibles = CONFIG.totalNumbers - vendidos;
          const pct = Math.round((vendidos / CONFIG.totalNumbers) * 100);
          const PAD = 36;

          // ── Helpers ──
          function rrect(x, y, w, h, r, opts) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
            if (opts.fill) { ctx.fillStyle = opts.fill; ctx.fill(); }
            if (opts.stroke) { ctx.strokeStyle = opts.stroke; ctx.lineWidth = opts.lw || 2; ctx.stroke(); }
          }
          function shadow(fn, c, b, y) {
            ctx.save(); ctx.shadowColor = c; ctx.shadowBlur = b; ctx.shadowOffsetY = y; fn(); ctx.restore();
          }

          // Intentar cargar imagen del producto (local primero, luego online)
          let productImg = null;
          async function tryLoadImage(src, useCors) {
            return new Promise((resolve, reject) => {
              const img = new Image();
              if (useCors) img.crossOrigin = 'anonymous';
              img.onload = () => resolve(img);
              img.onerror = reject;
              img.src = src;
            });
          }
          try {
            productImg = await tryLoadImage(CONFIG.bgImage, false);
          } catch (e) {
            try {
              productImg = await tryLoadImage(CONFIG.bgImageFallback, true);
            } catch (e2) { productImg = null; }
          }

          // ═══════════════════════════════════════════
          // 1. FONDO - Gradiente fresco claro
          // ═══════════════════════════════════════════
          const bg = ctx.createLinearGradient(0, 0, 0, H);
          bg.addColorStop(0, '#e0f7fa');
          bg.addColorStop(0.15, '#f1f8f6');
          bg.addColorStop(0.5, '#fafffe');
          bg.addColorStop(1, '#f5f5f5');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);

          // Barra superior degradada fresca
          const topBar = ctx.createLinearGradient(0, 0, W, 0);
          topBar.addColorStop(0, '#00b894');
          topBar.addColorStop(0.5, '#00cec9');
          topBar.addColorStop(1, '#0984e3');
          ctx.fillStyle = topBar;
          ctx.fillRect(0, 0, W, 8);

          // ═══════════════════════════════════════════
          // 2. HEADER CON IMAGEN DEL PRODUCTO
          // ═══════════════════════════════════════════
          const hdrY = 28;
          const hdrH = 380;

          // Clip redondeado para el header
          ctx.save();
          ctx.beginPath();
          const hdrR = 28;
          ctx.moveTo(PAD + hdrR, hdrY);
          ctx.arcTo(W - PAD, hdrY, W - PAD, hdrY + hdrH, hdrR);
          ctx.arcTo(W - PAD, hdrY + hdrH, PAD, hdrY + hdrH, hdrR);
          ctx.arcTo(PAD, hdrY + hdrH, PAD, hdrY, hdrR);
          ctx.arcTo(PAD, hdrY, W - PAD, hdrY, hdrR);
          ctx.closePath();
          ctx.clip();

          if (productImg) {
            // Dibujar imagen del producto
            const iw = productImg.width, ih = productImg.height;
            const cw = W - PAD * 2, ch = hdrH;
            const scale = Math.max(cw / iw, ch / ih);
            const dw = iw * scale, dh = ih * scale;
            const dx = PAD + (cw - dw) / 2, dy = hdrY + (ch - dh) / 2;
            ctx.drawImage(productImg, dx, dy, dw, dh);

            // Overlay gradiente para legibilidad
            const ov = ctx.createLinearGradient(0, hdrY, 0, hdrY + hdrH);
            ov.addColorStop(0, 'rgba(0,90,80,0.25)');
            ov.addColorStop(0.4, 'rgba(0,80,70,0.55)');
            ov.addColorStop(1, 'rgba(0,60,55,0.88)');
            ctx.fillStyle = ov;
            ctx.fillRect(PAD, hdrY, cw, ch);
          } else {
            // Gradiente fresco de respaldo
            const hg = ctx.createLinearGradient(PAD, hdrY, W - PAD, hdrY + hdrH);
            hg.addColorStop(0, '#00b894');
            hg.addColorStop(0.5, '#00cec9');
            hg.addColorStop(1, '#0984e3');
            ctx.fillStyle = hg;
            ctx.fillRect(PAD, hdrY, W - PAD * 2, hdrH);
          }
          ctx.restore();

          // Borde sutil del header
          rrect(PAD, hdrY, W - PAD * 2, hdrH, hdrR, { stroke: 'rgba(255,255,255,0.3)', lw: 2 });

          // Texto sobre el header
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';

          // Label "RIFA"
          ctx.fillStyle = 'rgba(255,255,255,0.75)';
          ctx.font = '600 20px "DM Sans", sans-serif';
          ctx.fillText('✦  G R A N   R I F A  ✦', W / 2, hdrY + 24);

          // Línea decorativa
          const hLine = ctx.createLinearGradient(PAD + 60, 0, W - PAD - 60, 0);
          hLine.addColorStop(0, 'transparent');
          hLine.addColorStop(0.3, 'rgba(255,255,255,0.5)');
          hLine.addColorStop(0.7, 'rgba(255,255,255,0.5)');
          hLine.addColorStop(1, 'transparent');
          ctx.strokeStyle = hLine;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(PAD + 60, hdrY + 56);
          ctx.lineTo(W - PAD - 60, hdrY + 56);
          ctx.stroke();

          // Título
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 48px "DM Sans", sans-serif';
          const tUp = CONFIG.titulo.toUpperCase();
          if (ctx.measureText(tUp).width > W - 140) {
            const w = tUp.split(' '), m = Math.ceil(w.length / 2);
            ctx.fillText(w.slice(0, m).join(' '), W / 2, hdrY + 75);
            ctx.fillText(w.slice(m).join(' '), W / 2, hdrY + 130);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '24px "DM Sans", sans-serif';
            ctx.fillText(CONFIG.descripcionCorta, W / 2, hdrY + 190);
          } else {
            ctx.fillText(tUp, W / 2, hdrY + 85);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '24px "DM Sans", sans-serif';
            ctx.fillText(CONFIG.descripcionCorta, W / 2, hdrY + 150);
          }

          // Badges de precio y fecha
          const bY = hdrY + hdrH - 72;
          const bW = 240, bH = 46, bGap = 24;
          // Precio
          rrect(W / 2 - bW - bGap / 2, bY, bW, bH, bH / 2, { fill: 'rgba(255,255,255,0.2)' });
          rrect(W / 2 - bW - bGap / 2, bY, bW, bH, bH / 2, { stroke: 'rgba(255,255,255,0.3)', lw: 1.5 });
          ctx.fillStyle = '#FFF';
          ctx.font = 'bold 22px "DM Sans", sans-serif';
          ctx.textBaseline = 'middle';
          ctx.fillText('$ ' + CONFIG.precio, W / 2 - bGap / 2 - bW / 2, bY + bH / 2);
          // Fecha
          rrect(W / 2 + bGap / 2, bY, bW, bH, bH / 2, { fill: 'rgba(255,255,255,0.2)' });
          rrect(W / 2 + bGap / 2, bY, bW, bH, bH / 2, { stroke: 'rgba(255,255,255,0.3)', lw: 1.5 });
          ctx.fillText('Al venderse', W / 2 + bGap / 2 + bW / 2, bY + bH / 2);

          // ═══════════════════════════════════════════
          // 2.5 BANNER DE BENEFICENCIA
          // ═══════════════════════════════════════════
          const benY = hdrY + hdrH + 18;
          const benH = 72;

          // Fondo del banner con gradiente rosa/rojo suave (oncología)
          const benGrad = ctx.createLinearGradient(PAD, benY, W - PAD, benY);
          benGrad.addColorStop(0, '#ff6b6b');
          benGrad.addColorStop(0.5, '#ee5a24');
          benGrad.addColorStop(1, '#ff6b6b');
          shadow(() => {
            rrect(PAD, benY, W - PAD * 2, benH, 18, { fill: benGrad });
          }, 'rgba(238,90,36,0.2)', 12, 4);

          // Corazón izquierdo (dibujo manual en vez de emoji)
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 26px "DM Sans", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('♥', PAD + 42, benY + benH / 2);

          // Texto "RIFA A BENEFICIO DE"
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.font = '600 17px "DM Sans", sans-serif';
          ctx.fillText('RIFA A BENEFICIO DE', W / 2, benY + 22);

          // Nombre del beneficiario
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 24px "DM Sans", sans-serif';
          ctx.fillText(CONFIG.beneficiario.toUpperCase(), W / 2, benY + 50);

          // Corazón derecho
          ctx.font = 'bold 26px "DM Sans", sans-serif';
          ctx.fillText('♥', W - PAD - 42, benY + benH / 2);

          // ═══════════════════════════════════════════
          // 3. TARJETA DE CONTADOR
          // ═══════════════════════════════════════════
          const cY = benY + benH + 16;
          const cH = 170;

          shadow(() => {
            rrect(PAD, cY, W - PAD * 2, cH, 22, { fill: '#FFFFFF' });
          }, 'rgba(0,184,148,0.12)', 20, 6);
          rrect(PAD, cY, W - PAD * 2, cH, 22, { stroke: '#e0f2f1', lw: 1.5 });

          // Icono decorativo
          ctx.fillStyle = '#e0f7fa';
          ctx.beginPath();
          ctx.arc(PAD + 60, cY + cH / 2, 36, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#00b894';
          ctx.font = '32px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('#', PAD + 60, cY + cH / 2);

          // Número grande
          ctx.fillStyle = '#00b894';
          ctx.font = 'bold 68px "DM Sans", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(vendidos.toString(), W / 2, cY + 8);

          // Label
          ctx.fillStyle = '#90a4ae';
          ctx.font = '600 18px "DM Sans", sans-serif';
          ctx.fillText('V E N D I D O S', W / 2, cY + 82);

          // Barra de progreso
          const pbW = W - PAD * 2 - 60;
          const pbH = 14;
          const pbX = PAD + 30;
          const pbY = cY + 115;

          rrect(pbX, pbY, pbW, pbH, pbH / 2, { fill: '#ecf0f1' });
          const fW = Math.max(pbH, (vendidos / CONFIG.totalNumbers) * pbW);
          const pg = ctx.createLinearGradient(pbX, 0, pbX + fW, 0);
          pg.addColorStop(0, '#00b894');
          pg.addColorStop(1, '#55efc4');
          rrect(pbX, pbY, fW, pbH, pbH / 2, { fill: pg });

          // Textos del progreso
          ctx.font = '16px "DM Sans", sans-serif';
          ctx.textBaseline = 'top';
          ctx.textAlign = 'left';
          ctx.fillStyle = '#00b894';
          ctx.fillText(`✓ ${disponibles} disponibles`, pbX, pbY + pbH + 10);
          ctx.textAlign = 'right';
          ctx.fillStyle = '#b2bec3';
          ctx.fillText(`${pct}%`, pbX + pbW, pbY + pbH + 10);

          // ═══════════════════════════════════════════
          // 4. TÍTULO DE SECCIÓN
          // ═══════════════════════════════════════════
          const sY = cY + cH + 24;

          ctx.strokeStyle = '#b2dfdb';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(W / 2 - 200, sY + 12);
          ctx.lineTo(W / 2 - 90, sY + 12);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(W / 2 + 90, sY + 12);
          ctx.lineTo(W / 2 + 200, sY + 12);
          ctx.stroke();

          ctx.fillStyle = '#00897b';
          ctx.font = 'bold 24px "DM Sans", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText('N Ú M E R O S', W / 2, sY);

          // ═══════════════════════════════════════════
          // 5. CUADRÍCULA DE NÚMEROS
          // ═══════════════════════════════════════════
          const gY = sY + 42;
          const cols = 10;
          const rows = Math.ceil(CONFIG.totalNumbers / cols);
          const gap = 7;
          const gPad = 38;
          const cell = Math.floor((W - gPad * 2 - gap * (cols - 1)) / cols);
          const gW = cols * cell + (cols - 1) * gap;
          const gX = (W - gW) / 2;

          // Fondo sutil para la grilla
          rrect(gX - 12, gY - 12, gW + 24, rows * (cell + gap) + 16, 18, { fill: 'rgba(0,184,148,0.04)' });

          for (let i = 0; i < CONFIG.totalNumbers; i++) {
            const row = Math.floor(i / cols);
            const col = i % cols;
            const x = gX + col * (cell + gap);
            const y = gY + row * (cell + gap);
            const sold = isVendido(i);
            const num = i.toString().padStart(2, '0');

            if (sold) {
              // ── VENDIDO ──
              shadow(() => {
                rrect(x, y, cell, cell, 14, { fill: '#fff0ee' });
              }, 'rgba(231,76,60,0.08)', 4, 2);
              rrect(x, y, cell, cell, 14, { stroke: '#f5c6cb', lw: 1.5 });

              // Acento lateral rojo
              ctx.save();
              ctx.beginPath();
              ctx.moveTo(x + 4, y + 8);
              ctx.arcTo(x, y + 8, x, y + cell - 8, 3);
              ctx.arcTo(x, y + cell - 8, x + 4, y + cell - 8, 3);
              ctx.lineTo(x + 4, y + cell - 8);
              ctx.closePath();
              ctx.fillStyle = '#e74c3c';
              ctx.fill();
              ctx.restore();

              // Número semitransparente
              ctx.globalAlpha = 0.4;
              ctx.fillStyle = '#c0392b';
              ctx.font = 'bold 26px "DM Sans", sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(num, x + cell / 2, y + cell / 2);
              ctx.globalAlpha = 1;

              // X sutil
              ctx.strokeStyle = 'rgba(231,76,60,0.25)';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.moveTo(x + 16, y + 16);
              ctx.lineTo(x + cell - 16, y + cell - 16);
              ctx.moveTo(x + cell - 16, y + 16);
              ctx.lineTo(x + 16, y + cell - 16);
              ctx.stroke();

            } else {
              // ── DISPONIBLE ──
              shadow(() => {
                rrect(x, y, cell, cell, 14, { fill: '#FFFFFF' });
              }, 'rgba(0,0,0,0.05)', 5, 2);
              rrect(x, y, cell, cell, 14, { stroke: '#e0e0e0', lw: 1 });

              // Acento lateral verde
              ctx.save();
              ctx.beginPath();
              ctx.moveTo(x + 4, y + 8);
              ctx.arcTo(x, y + 8, x, y + cell - 8, 3);
              ctx.arcTo(x, y + cell - 8, x + 4, y + cell - 8, 3);
              ctx.lineTo(x + 4, y + cell - 8);
              ctx.closePath();
              ctx.fillStyle = '#00b894';
              ctx.fill();
              ctx.restore();

              // Número
              ctx.fillStyle = '#2d3436';
              ctx.font = 'bold 28px "DM Sans", sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(num, x + cell / 2, y + cell / 2);
            }
          }

          // ═══════════════════════════════════════════
          // 6. LEYENDA
          // ═══════════════════════════════════════════
          const gEnd = gY + rows * (cell + gap);
          const lY = gEnd + 18;

          // Disponible
          shadow(() => {
            rrect(W / 2 - 220, lY, 28, 28, 8, { fill: '#FFFFFF' });
          }, 'rgba(0,0,0,0.04)', 3, 1);
          rrect(W / 2 - 220, lY, 28, 28, 8, { stroke: '#e0e0e0', lw: 1 });
          ctx.save();
          ctx.beginPath();
          ctx.rect(W / 2 - 220, lY + 5, 4, 18);
          ctx.fillStyle = '#00b894';
          ctx.fill();
          ctx.restore();

          ctx.fillStyle = '#636e72';
          ctx.font = '20px "DM Sans", sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText('Disponible', W / 2 - 180, lY + 4);

          // Vendido
          rrect(W / 2 + 40, lY, 28, 28, 8, { fill: '#fff0ee' });
          rrect(W / 2 + 40, lY, 28, 28, 8, { stroke: '#f5c6cb', lw: 1 });
          ctx.save();
          ctx.beginPath();
          ctx.rect(W / 2 + 40, lY + 5, 4, 18);
          ctx.fillStyle = '#e74c3c';
          ctx.fill();
          ctx.restore();

          ctx.fillStyle = '#636e72';
          ctx.fillText('Vendido', W / 2 + 80, lY + 4);

          // ═══════════════════════════════════════════
          // 7. MENSAJE
          // ═══════════════════════════════════════════
          const mY = lY + 52;

          shadow(() => {
            rrect(PAD, mY, W - PAD * 2, 62, 16, { fill: '#e8f5e9' });
          }, 'rgba(0,184,148,0.08)', 6, 2);
          rrect(PAD, mY, W - PAD * 2, 62, 16, { stroke: '#a5d6a7', lw: 1.5 });

          ctx.fillStyle = '#2e7d32';
          ctx.font = 'bold 22px "DM Sans", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🎲  ' + CONFIG.fechaLimite, W / 2, mY + 31);

          // ═══════════════════════════════════════════
          // 8. PIE DE PÁGINA
          // ═══════════════════════════════════════════
          const fY = mY + 62 + 50;

          ctx.strokeStyle = '#e0e0e0';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(200, fY - 12);
          ctx.lineTo(W - 200, fY - 12);
          ctx.stroke();

          const fecha = new Date();
          const opts = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
          ctx.fillStyle = '#b2bec3';
          ctx.font = '19px "DM Sans", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText('Generado el ' + fecha.toLocaleDateString('es-ES', opts), W / 2, fY);

          // Barra inferior fresca (justo después del footer)
          const botBarY = fY + 34;
          const botBar = ctx.createLinearGradient(0, botBarY, W, botBarY);
          botBar.addColorStop(0, '#00b894');
          botBar.addColorStop(0.5, '#00cec9');
          botBar.addColorStop(1, '#0984e3');
          ctx.fillStyle = botBar;
          ctx.fillRect(0, botBarY, W, 6);

          // Exportar solo el área con contenido (recortar canvas)
          const cropH = botBarY + 6;
          const cropCanvas = document.createElement('canvas');
          cropCanvas.width = W;
          cropCanvas.height = cropH;
          const cropCtx = cropCanvas.getContext('2d');
          cropCtx.drawImage(canvas, 0, 0, W, cropH, 0, 0, W, cropH);

          // Intentar exportar el canvas recortado, si falla usar el original
          return new Promise((resolve, reject) => {
            try {
              cropCanvas.toBlob((blob) => {
                if (blob) resolve(blob);
                else {
                  // Fallback al canvas original si el blob es null
                  canvas.toBlob((b2) => b2 ? resolve(b2) : reject(new Error('No se pudo generar blob')), 'image/png');
                }
              }, 'image/png');
            } catch (secErr) {
              console.warn('Canvas tainted, intentando canvas original:', secErr);
              try {
                canvas.toBlob((b2) => b2 ? resolve(b2) : reject(new Error('No se pudo generar blob')), 'image/png');
              } catch (e2) {
                reject(new Error('Canvas contaminado: ' + e2.message));
              }
            }
          });
        } catch (error) {
          console.error('Error generando imagen:', error);
          throw error;
        } finally {
          loadingOverlay.classList.remove('active');
        }
      }

      // Protección contra doble clic
      let _compartiendo = false;

      // Función para compartir en WhatsApp
      async function compartirWhatsAppImagen() {
        if (_compartiendo) return;
        _compartiendo = true;

        try {
          const imagenBlob = await generarImagenRifa();
          const file = new File([imagenBlob], 'rifa-estado.png', { type: 'image/png' });

          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file]
            });
          } else {
            const url = URL.createObjectURL(imagenBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'rifa-estado.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            setTimeout(() => {
              URL.revokeObjectURL(url);
              const mensaje = encodeURIComponent('🔊 ' + CONFIG.titulo + ' - ' + getVendidosCount() + ' números vendidos');
              window.open('https://wa.me/?text=' + mensaje, '_blank');
            }, 100);
          }
        } catch (error) {
          console.error('Error:', error);
          alert('Error al generar la imagen. Intenta de nuevo.');
        } finally {
          _compartiendo = false;
        }
      }

        // Event listeners
        if (!adminMode) {

        document.getElementById('shareRedesBtn')?.addEventListener('click', () => {
          const mensaje = encodeURIComponent(`🔊 ${CONFIG.titulo}\n📊 ${getVendidosCount()} de ${CONFIG.totalNumbers} vendidos\n💰 ${CONFIG.precio}`);
          window.open(`https://twitter.com/intent/tweet?text=${mensaje}`, '_blank');
          document.getElementById('shareOptions').style.display = 'none';
        });

        document.getElementById('shareWhatsAppImgBtn')?.addEventListener('click', async () => {
          document.getElementById('shareOptions').style.display = 'none';
          await compartirWhatsAppImagen();
        });

        document.getElementById('shareWhatsAppTodosBtn')?.addEventListener('click', () => {
          const telefonos = numeros.map(item => item.telefono).filter(t => t);
          if (telefonos.length === 0) {
            alert('No hay teléfonos');
            return;
          }
          const msg = prompt('Mensaje:', '🔊 ¡Hola! Les recuerdo que la rifa se cierra pronto.');
          if (msg) {
            window.open(`https://wa.me/${telefonos[0].replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
            alert(`Chat con ${telefonos[0]}`);
          }
          document.getElementById('shareOptions').style.display = 'none';
        });
      }

      // Funciones globales
      window.eliminarVentaClick = function (numero) {
        eliminarVenta(numero);
      };

      window.editarVentaClick = function (numero) {
        const venta = getVentaByNumero(numero);
        if (venta) mostrarFormularioEditar(venta);
      };

      function mostrarFormularioVenta(numero) {
        const modal = document.getElementById('modalVenta');
        modal.style.display = 'block';
        modal.innerHTML = `
        <h3>Vender número ${numero}</h3>
        <input type="text" id="venderNombre" placeholder="Nombre" />
        <input type="tel" id="venderTelefono" placeholder="Teléfono" required />
        <textarea id="venderNota" placeholder="Nota"></textarea>
        <div class="btn-group">
          <button class="btn" id="confirmarVentaBtn">Vender</button>
          <button class="btn-outline" id="cancelarVentaBtn">Cancelar</button>
        </div>
      `;

        document.getElementById('cancelarVentaBtn').onclick = () => modal.style.display = 'none';
        document.getElementById('confirmarVentaBtn').onclick = () => {
          const tel = document.getElementById('venderTelefono').value.trim();
          if (!tel) { alert('Teléfono requerido'); return; }
          numeros.push({
            numero: numero,
            nombre: document.getElementById('venderNombre').value.trim() || 'Sin nombre',
            telefono: tel,
            nota: document.getElementById('venderNota').value.trim(),
            fecha: new Date().toISOString()
          });
          saveToStorage();
          modal.style.display = 'none';
          renderUI();
        };
      }

      function mostrarFormularioEditar(venta) {
        const modal = document.getElementById('modalEditar');
        modal.style.display = 'block';
        modal.innerHTML = `
        <h3>Editar número ${venta.numero}</h3>
        <input type="text" id="editarNombre" value="${venta.nombre || ''}" />
        <input type="tel" id="editarTelefono" value="${venta.telefono || ''}" />
        <textarea id="editarNota">${venta.nota || ''}</textarea>
        <div class="btn-group">
          <button class="btn" id="guardarEdicionBtn">Guardar</button>
          <button class="btn-outline" id="cancelarEdicionBtn">Cancelar</button>
        </div>
      `;

        document.getElementById('cancelarEdicionBtn').onclick = () => modal.style.display = 'none';
        document.getElementById('guardarEdicionBtn').onclick = () => {
          const tel = document.getElementById('editarTelefono').value.trim();
          if (!tel) { alert('Teléfono requerido'); return; }
          editarVenta(venta.numero, {
            nombre: document.getElementById('editarNombre').value.trim(),
            telefono: tel,
            nota: document.getElementById('editarNota').value.trim()
          });
          modal.style.display = 'none';
        };
      }

      // Inicializar
      document.getElementById('appContainer').style.setProperty('--bg-image', `url('${CONFIG.bgImage}')`);
      renderUI();

      // Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
        self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
      `)).catch(() => { });
      }
    })();
  </script>
</body>

</html>
